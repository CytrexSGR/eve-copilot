# Connection limiting for waiting room functionality
# Include this in http {} block: include /etc/nginx/conf.d/limit-conn.conf;

# Zone for tracking connections per IP (using real IP from Cloudflare)
# 10m = ~160,000 IPs can be tracked
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# Zone for tracking total server connections
limit_conn_zone $server_name zone=per_server:10m;
