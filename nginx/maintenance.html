<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>EVE Intelligence - Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #58a6ff;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 2rem;
    }
    .status-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(88,166,255,0.3);
      border-radius: 12px;
      padding: 2rem;
      margin: 2rem 0;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(88,166,255,0.3);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 1.2rem;
      color: #f0ad4e;
      margin-bottom: 0.5rem;
    }
    .message {
      color: #8b949e;
      line-height: 1.6;
    }
    .refresh-note {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #6e7681;
    }
    .eve-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eve-icon">⚔️</div>
    <h1>EVE Intelligence</h1>
    <p class="subtitle">Real-time Combat Intelligence for New Eden</p>

    <div class="status-box">
      <div class="spinner"></div>
      <div class="status">Maintenance in Progress</div>
      <p class="message">
        We're upgrading our systems to bring you better intel.<br>
        The capsuleers will be back online shortly.
      </p>
    </div>

    <p class="refresh-note">
      This page auto-refreshes every 30 seconds.<br>
      You'll be redirected automatically when we're back.
    </p>
  </div>
</body>
</html>
