# HTTP -> HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name eve.infinimind-creations.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eve.infinimind-creations.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/eve.infinimind-creations.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eve.infinimind-creations.com/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block direct access (non-Cloudflare IPs)
    if ($cloudflare_ip = 0) {
        return 403;
    }

    # Maintenance Mode - check if .maintenance file exists
    set $maintenance 0;
    if (-f /var/www/html/.maintenance) {
        set $maintenance 1;
    }

    # Maintenance page - named location for error_page
    location @maintenance {
        root /var/www/html;
        rewrite ^ /maintenance.html break;
    }

    # Return 503 when in maintenance mode
    error_page 503 @maintenance;
    if ($maintenance = 1) {
        return 503;
    }

    # Waiting Room - connection limiting (429 when at capacity)
    # Requires limit-conn.conf to be included in http {} block
    limit_conn per_ip 30;        # Max 30 connections per IP (ectmap needs ~15 for JS chunks)
    limit_conn per_server 50;    # Max 50 total connections
    limit_conn_status 429;       # Return 429 (not 503) for waiting room
    limit_conn_log_level warn;   # Log to error.log when limit hit

    # Waiting room page - when at capacity
    location @waiting_room {
        root /var/www/html;
        rewrite ^ /waiting-room.html break;
        # Log all waiting room hits to separate file
        access_log /var/log/nginx/eve-waiting-room.log combined;
    }
    error_page 429 @waiting_room;

    # Max body size for large requests
    client_max_body_size 10M;

    # Proxy timeouts for long-running requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Static files (analytics dashboard) - Protected with Basic Auth
    location /stats.html {
        root /var/www/html;
        try_files $uri =404;

        # Basic Authentication
        auth_basic "EVE Intelligence Analytics";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # ectmap - EVE Universe Map (must be BEFORE /api/ to take precedence)
    location /ectmap {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Static snapshots (ectmap-service generated images)
    location /snapshots/ {
        alias /var/www/snapshots/;
        expires 7d;
    }

    # ECTMap Service API endpoints
    location /api/maps {
        proxy_pass http://localhost:8011;
        proxy_read_timeout 60s;
    }

    location /api/snapshots {
        proxy_pass http://localhost:8011;
        proxy_read_timeout 120s;
    }

    location /api/views {
        proxy_pass http://localhost:8011;
    }

    # Root - serve public frontend
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Main API endpoints (/api/war/*)
    location /api/war/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # Reports API (war-intel-service)
    location /api/reports/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # Public API endpoints (/api/*)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
    }

    # WebSocket support for agent
    location /agent/stream/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API Documentation
    location /docs {
        proxy_pass http://127.0.0.1:8001;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8001;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8001;
    }
}
