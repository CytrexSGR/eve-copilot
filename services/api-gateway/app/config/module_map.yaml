# Module-based endpoint gating
# Checked BEFORE tier_map.yaml -- first match wins
# "free" = no module needed (publicly accessible data)
#
# Pattern matching:
#   - Exact: /api/foo matches only /api/foo
#   - Trailing wildcard: /api/foo/* matches /api/foo/bar and /api/foo/bar/baz
#   - Mid-path wildcard: /api/foo/*/bar matches /api/foo/123/bar
#   - Combined: /api/foo/*/bar/* matches /api/foo/123/bar/baz

free:
  # Public data -- always accessible
  - "/api/war/battles"
  - "/api/war/battles/active"
  - "/api/war/battle/*/sides"
  - "/api/war/battle/*/kills"
  - "/api/intelligence/fast/*/summary"
  - "/api/intelligence/fast/*/header"
  - "/api/intelligence/fast/*/overview"
  - "/api/market/prices/*"
  - "/api/items/*"
